<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Rendilo Reale — Essaim</title>
  <meta name="theme-color" content="#171208" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" href="/pwa-192.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #171208;
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: none;
      user-select: none;
      -webkit-user-select: none;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #stage { position: fixed; left: 50%; top: 50%; }
    #hud { position: fixed; inset: 0; pointer-events: none; color: #fff; }
    .hud-box {
      position: absolute; top: max(8px, env(safe-area-inset-top));
      font-size: 12px; line-height: 1.5;
      background: rgba(0, 0, 0, 0.45); border-radius: 8px; padding: 6px 10px;
      font-variant-numeric: tabular-nums;
    }
    #hud-perf { left: 8px; color: #9fe0a0; font-family: ui-monospace, monospace; }
    #hud-stats { right: 8px; text-align: right; display: none; font-size: 14px; }
    #hud.in-game #hud-stats { display: block; }

    /* Slider de % d'envoi — SEULE zone interactive du HUD */
    #hud-send {
      position: absolute; right: max(10px, env(safe-area-inset-right)); top: 50%; transform: translateY(-50%);
      display: none; flex-direction: column; align-items: center; gap: 8px;
      pointer-events: auto;
      background: rgba(0, 0, 0, 0.55); border-radius: 12px; padding: 10px;
      font-variant-numeric: tabular-nums;
    }
    #hud.in-game #hud-send { display: flex; }

    #send-value { text-align: center; font-size: 15px; font-weight: 700; }

    #send-range {
      width: 44px; height: min(300px, 34vh);
      writing-mode: vertical-lr; direction: rtl;
      appearance: none; -webkit-appearance: none; -moz-appearance: none;
      touch-action: none;
      background: transparent; border: none; padding: 0;
    }
    /* Webkit: Chrome, Safari, Edge */
    #send-range::-webkit-slider-track {
      width: 8px;
      background: repeating-linear-gradient(
        to right,
        rgba(255, 233, 168, 0.5) 0, rgba(255, 233, 168, 0.5) 1px,
        transparent 1px, transparent calc(100% / 9)
      );
      border-radius: 4px;
    }
    #send-range::-webkit-slider-thumb {
      appearance: none; -webkit-appearance: none;
      width: 34px; height: 22px; margin-top: 0;
      background: #b07d1e; border: 2px solid #6e4c0e; border-radius: 4px;
      cursor: pointer;
    }
    /* Firefox */
    #send-range::-moz-range-track {
      width: 8px;
      background: repeating-linear-gradient(
        to right,
        rgba(255, 233, 168, 0.5) 0, rgba(255, 233, 168, 0.5) 1px,
        transparent 1px, transparent calc(100% / 9)
      );
      border-radius: 4px; border: none;
    }
    #send-range::-moz-range-thumb {
      width: 34px; height: 22px;
      background: #b07d1e; border: 2px solid #6e4c0e; border-radius: 4px;
      cursor: pointer;
    }

    /* Restart du niveau — en bas à gauche, à l'écart du slider (pas de tap accidentel) */
    #hud-restart {
      position: absolute; left: 8px;
      bottom: max(10px, env(safe-area-inset-bottom));
      display: none; pointer-events: auto;
      width: 48px; height: 48px; border: 0; border-radius: 12px;
      font: inherit; font-size: 22px; line-height: 1;
      color: #fff; background: rgba(61, 47, 20, 0.85); cursor: pointer;
    }
    #hud-restart:active { background: #2a2010; }
    #hud.in-game #hud-restart { display: block; }

    /* Bandeau tutoriel (informatif, non interactif) */
    #hud-tuto {
      position: absolute; left: 50%; transform: translateX(-50%);
      top: calc(max(8px, env(safe-area-inset-top)) + 44px);
      display: none; max-width: min(86vw, 420px);
      background: rgba(0, 0, 0, 0.72); border: 1px solid rgba(246, 185, 59, 0.5);
      border-radius: 10px; padding: 10px 14px;
      font-size: 14px; line-height: 1.45; text-align: center;
    }
    #hud-tuto.visible { display: block; animation: tuto-in 0.25s ease-out; }
    @keyframes tuto-in { from { opacity: 0; transform: translate(-50%, -8px); } to { opacity: 1; transform: translate(-50%, 0); } }
    @media (prefers-reduced-motion: reduce) { #hud-tuto.visible { animation: none; } }

    /* Écrans (accueil, résultat) */
    #ui {
      position: fixed; inset: 0; display: none;
      align-items: center; justify-content: center;
      background: rgba(12, 8, 2, 0.78);
      color: #fff;
    }
    #ui.visible { display: flex; }
    .panel {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      width: min(86vw, 380px); max-height: 92vh; overflow-y: auto;
      text-align: center; padding: 12px;
      animation: panel-in 0.28s cubic-bezier(0.2, 1.2, 0.4, 1);
    }
    @keyframes panel-in { from { opacity: 0; transform: translateY(26px) scale(0.96); } to { opacity: 1; transform: none; } }
    .panel h1 {
      margin: 0 0 6px; font-size: 46px; font-weight: 900; letter-spacing: 4px;
      line-height: 1.05; color: #f6b93b; text-shadow: 0 3px 0 #8a5f13;
    }
    .panel h2 { margin: 0; font-size: 30px; font-weight: 900; letter-spacing: 1px; }
    .panel h2.win {
      color: #4ade80;
      text-shadow: 0 0 24px rgba(74, 222, 128, 0.55);
      animation: pop 0.55s cubic-bezier(0.2, 1.6, 0.4, 1);
    }
    .panel h2.lose { color: #f87171; animation: slam 0.35s ease-out; }
    @keyframes pop { 0% { transform: scale(0.2); opacity: 0; } 70% { transform: scale(1.15); } 100% { transform: scale(1); opacity: 1; } }
    @keyframes slam { 0% { transform: scale(1.6); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .sub { font-size: 15px; opacity: 0.85; margin: 0; }
    .rules { font-size: 14px; line-height: 2; opacity: 0.9; margin: 0; }
    .result-stats { font-size: 14px; opacity: 0.85; margin: 0; }
    .btn {
      width: 100%; padding: 14px 18px; border: 0; border-radius: 12px;
      font: inherit; font-size: 17px; font-weight: 700; color: #fff;
      background: #3d2f14; cursor: pointer;
      box-shadow: 0 3px 0 rgba(0, 0, 0, 0.4);
    }
    .btn:active { transform: translateY(2px); box-shadow: none; }
    .btn.primary { background: #b07d1e; box-shadow: 0 3px 0 #6e4c0e; }
    .levels { display: flex; flex-direction: column; gap: 8px; width: 100%; }
    .btn.level { display: flex; align-items: center; gap: 8px; text-align: left; font-size: 15px; padding: 12px 14px; }
    .btn.level .best { margin-left: auto; font-size: 12px; font-weight: 400; opacity: 0.85; }
    .btn.level .foes { font-size: 13px; opacity: 0.9; }
    .btn.level.done { background: #2e4022; box-shadow: 0 3px 0 #1a2613; }
    .btn.level.locked { opacity: 0.45; cursor: default; }
    .btn.small { width: auto; padding: 8px 16px; font-size: 13px; background: #241b0c; }
    a.hub-link { display: inline-block; text-decoration: none; color: #e8d5a8; opacity: 0.8; }

    /* Accueil : cartes de campagne (une par espèce) */
    .campaigns { display: flex; flex-direction: column; gap: 8px; width: 100%; }
    .campaign-card {
      display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
      padding: 12px 14px; border: 0; border-radius: 12px;
      font: inherit; color: #fff; background: #3d2f14; cursor: pointer;
      box-shadow: 0 3px 0 rgba(0, 0, 0, 0.4);
    }
    .campaign-card:not(.locked):active { transform: translateY(2px); box-shadow: none; }
    .campaign-card.locked { opacity: 0.5; cursor: default; box-shadow: none; }
    .cc-emoji { font-size: 28px; line-height: 1; }
    .cc-body { display: flex; flex-direction: column; gap: 2px; }
    .cc-name { font-size: 16px; font-weight: 700; }
    .cc-progress { font-size: 13px; opacity: 0.8; }
    .cc-hint { font-size: 12px; opacity: 0.85; color: #e8d5a8; }
    .panel h2.campaign-title { font-size: 26px; color: #f6b93b; }
    .unlock-line { font-size: 15px; font-weight: 700; color: #f6b93b; }

    /* Grille de niveaux d'une campagne — 5 colonnes de pastilles */
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; width: 100%; }
    .chip {
      position: relative; display: flex; align-items: center; justify-content: center;
      aspect-ratio: 1; min-width: 0; padding: 0; border: 0; border-radius: 10px;
      font: inherit; font-size: 15px; font-weight: 800; color: #fff;
      background: #3d2f14; cursor: pointer; box-shadow: 0 2px 0 rgba(0, 0, 0, 0.4);
    }
    .chip:not(.locked):active { transform: translateY(2px); box-shadow: none; }
    .chip.done { background: #2e4022; box-shadow: 0 2px 0 #1a2613; }
    /* « prochain niveau » : couleur + liseré + glyphe ▶ (jamais la couleur seule) */
    .chip.primary { background: #b07d1e; box-shadow: 0 2px 0 #6e4c0e; outline: 2px solid #ffe9a8; outline-offset: 1px; }
    .chip-next { position: absolute; top: 2px; left: 4px; font-size: 9px; color: #fff7e0; }
    .chip.locked { opacity: 0.4; cursor: default; box-shadow: none; }
    .chip-n { line-height: 1; }
    .chip-done { position: absolute; top: 2px; right: 4px; font-size: 9px; color: #7ee29a; }
    .chip-trophy { position: absolute; bottom: 1px; right: 2px; font-size: 8px; opacity: 0.85; }

    /* Écran des succès : familles à paliers (barres) + hauts faits one-shot */
    .ach-list, .feats { display: flex; flex-direction: column; gap: 8px; width: 100%; }
    .ach { background: #241b0c; border-radius: 12px; padding: 10px 12px; text-align: left; }
    .ach-head { display: flex; gap: 6px; align-items: baseline; font-size: 15px; }
    .ach-head .ach-tier { margin-left: auto; font-size: 12px; opacity: 0.75; }
    .ach-desc { font-size: 12px; opacity: 0.8; margin: 2px 0 8px; }
    .bar { height: 8px; background: #171208; border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; background: #f6b93b; }
    .feat {
      display: flex; align-items: center; gap: 10px; text-align: left;
      background: #241b0c; border: 1px solid transparent; border-radius: 12px; padding: 10px 12px;
    }
    .feat.locked { opacity: 0.45; }
    .feat.hard { border-color: #b07d1e; } /* + libellé « ★ légende » : jamais la couleur seule */
    .feat-icon { font-size: 22px; line-height: 1; }
    .feat-body { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .feat-name { font-size: 14px; font-weight: 700; }
    .feat-hard { font-size: 11px; font-weight: 700; color: #f6b93b; }
    .feat-desc { font-size: 12px; opacity: 0.8; }
    .feat-line { font-size: 14px; font-weight: 700; color: #f6b93b; }

    /* Réinitialisation de la progression — confirmation en deux temps */
    .btn.danger { background: #7f1d1d; box-shadow: 0 3px 0 #450a0a; }
    .reset-warn { font-size: 14px; line-height: 1.5; color: #fca5a5; }
    .reset-row { display: flex; gap: 8px; width: 100%; }
    .reset-row .btn { flex: 1; }

    @media (prefers-reduced-motion: reduce) {
      .panel, .panel h2.win, .panel h2.lose { animation: none; }
    }
  </style>
</head>
<body>
  <div id="stage"></div>
  <div id="hud">
    <div id="hud-perf" class="hud-box"></div>
    <div id="hud-stats" class="hud-box"></div>
    <div id="hud-tuto" aria-live="polite"></div>
    <div id="hud-send">
      <span id="send-value" aria-hidden="true">50 %</span>
      <input id="send-range" type="range" min="10" max="100" step="10" value="50" aria-label="Part de l'essaim envoyée à chaque ordre" aria-valuetext="50 %">
    </div>
    <button id="hud-restart" type="button" aria-label="Recommencer le niveau">↻</button>
  </div>
  <div id="ui"></div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>

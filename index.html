<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Rendilo Reale — Horde Shooter</title>
  <meta name="theme-color" content="#0b1016" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" href="/pwa-192.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #0b1016;
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: none;
      user-select: none;
      -webkit-user-select: none;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #stage { position: fixed; left: 50%; top: 50%; }
    #hud { position: fixed; inset: 0; pointer-events: none; color: #fff; }
    .hud-box {
      position: absolute; top: max(8px, env(safe-area-inset-top));
      font-size: 12px; line-height: 1.5;
      background: rgba(0, 0, 0, 0.45); border-radius: 8px; padding: 6px 10px;
      font-variant-numeric: tabular-nums;
      white-space: pre-line;
    }
    #hud-perf { left: 8px; color: #9fe0a0; font-family: ui-monospace, monospace; }
    #hud-stats { right: 8px; text-align: right; display: none; }
    #hud.in-game #hud-stats { display: block; }
    #hud-stats .big { font-size: 18px; font-weight: 800; }
    #hud-stats .buffs { color: #fbbf24; font-weight: 700; }

    /* Écrans (menu, boutique, résultat) */
    #ui {
      position: fixed; inset: 0; display: none;
      align-items: center; justify-content: center;
      background: rgba(5, 10, 18, 0.72);
      color: #fff;
    }
    #ui.visible { display: flex; }
    .panel {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      width: min(86vw, 380px); max-height: 92vh; overflow-y: auto;
      text-align: center; padding: 12px;
      animation: panel-in 0.28s cubic-bezier(0.2, 1.2, 0.4, 1);
    }
    @keyframes panel-in { from { opacity: 0; transform: translateY(26px) scale(0.96); } to { opacity: 1; transform: none; } }
    .panel.no-anim { animation: none; }
    .panel h1 {
      margin: 0 0 6px; font-size: 44px; font-weight: 900; letter-spacing: 3px;
      line-height: 1.05; color: #60a5fa; text-shadow: 0 3px 0 #1d4ed8;
    }
    .panel h2 { margin: 0; font-size: 34px; font-weight: 900; letter-spacing: 2px; }
    .panel h2.win {
      color: #4ade80; font-size: 46px;
      text-shadow: 0 0 24px rgba(74, 222, 128, 0.55);
      animation: pop 0.55s cubic-bezier(0.2, 1.6, 0.4, 1);
    }
    .panel h2.lose { color: #f87171; animation: slam 0.35s ease-out; }
    @keyframes pop { 0% { transform: scale(0.2); opacity: 0; } 70% { transform: scale(1.15); } 100% { transform: scale(1); opacity: 1; } }
    @keyframes slam { 0% { transform: scale(1.6); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .sub { font-size: 15px; opacity: 0.85; }
    .result-stats { font-size: 14px; opacity: 0.85; }
    .gold-line { font-size: 20px; font-weight: 800; color: #fbbf24; }
    .gold-line .dim { font-size: 13px; font-weight: 400; opacity: 0.75; }
    .btn {
      width: 100%; padding: 14px 18px; border: 0; border-radius: 12px;
      font: inherit; font-size: 17px; font-weight: 700; color: #fff;
      background: #1f2c3d; cursor: pointer;
      box-shadow: 0 3px 0 rgba(0, 0, 0, 0.4);
    }
    .btn:active { transform: translateY(2px); box-shadow: none; }
    .btn.primary { background: #2563eb; box-shadow: 0 3px 0 #1e40af; }
    .btn.small { width: auto; padding: 8px 16px; font-size: 14px; background: #16202e; }
    .btn[disabled] { opacity: 0.45; cursor: default; }
    .chips { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .chip {
      min-width: 44px; padding: 8px 10px; border: 0; border-radius: 10px;
      font: inherit; font-weight: 800; color: #fff; background: #1f2c3d; cursor: pointer;
    }
    .chip.next { background: #2563eb; }
    .chip.done { background: #14532d; }
    .chip.locked { opacity: 0.4; cursor: default; }
    .cards { display: flex; flex-direction: column; gap: 10px; width: 100%; }
    .card { background: #131c29; border-radius: 12px; padding: 12px; text-align: left; }
    .card-head { display: flex; gap: 6px; align-items: baseline; font-size: 16px; }
    .card-head .lvl { margin-left: auto; font-size: 12px; opacity: 0.7; }
    .card-effect { font-size: 13px; opacity: 0.85; margin: 6px 0 10px; }
    .card-sub { font-size: 12px; opacity: 0.55; margin: -6px 0 10px; line-height: 1.35; }
    .section-note { font-size: 12px; opacity: 0.55; margin: 2px 0 8px; line-height: 1.35; }
    .btn.buy { padding: 10px; font-size: 15px; background: #2563eb; box-shadow: 0 3px 0 #1e40af; }
    .btn.buy[disabled] { background: #1f2c3d; box-shadow: none; }
    .btn.buy.alt { background: #14532d; box-shadow: 0 3px 0 #0d3a1f; }
    .btn.buy.alt[disabled] { background: #166534; opacity: 1; }
    .card-row { display: flex; gap: 8px; }
    .card-row .btn { flex: 1; }
    .card.equipped { outline: 2px solid #22c55e; }
    .section-title { font-size: 14px; font-weight: 800; opacity: 0.7; letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }
    .bar { height: 8px; background: #1f2937; border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
    .bar-fill { height: 100%; background: #fbbf24; }
    .pill { background: #ef4444; border-radius: 999px; padding: 1px 8px; font-size: 12px; }
    .chip-stars { display: block; font-size: 9px; color: #fbbf24; line-height: 1; }
    .comp-controls { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .comp-pct { font-weight: 800; min-width: 48px; text-align: center; }
    .btn.stepper { width: 34px; padding: 6px 0; font-size: 16px; background: #2563eb; box-shadow: 0 2px 0 #1e40af; }
    .btn.stepper[disabled] { background: #1f2c3d; box-shadow: none; }
    .comp-locked { text-align: center; opacity: 0.6; }
    .result-stars { font-size: 34px; color: #fbbf24; letter-spacing: 6px; text-shadow: 0 0 18px rgba(251, 191, 36, 0.6); }
  </style>
</head>
<body>
  <div id="stage"></div>
  <div id="hud">
    <div id="hud-perf" class="hud-box"></div>
    <div id="hud-stats" class="hud-box"></div>
  </div>
  <div id="ui"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
